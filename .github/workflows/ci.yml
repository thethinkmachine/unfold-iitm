name: CI

# Install deps, build the extension (build/ is gitignored, assembled fresh
# from extension/ + generated run.js), fail if the committed bookmarklet
# outputs are stale, and upload the unpacked extension as an artifact.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Syntax check source
        run: node --check bookmarklet/bookmarklet-source.js

      - name: Validate manifest JSON
        run: node -e "JSON.parse(require('fs').readFileSync('extension/manifest.json','utf8'))"

      - name: Build
        run: npm run build

      - name: Fail if bookmarklet outputs drifted from source
        run: git diff --exit-code -- bookmarklet/bookmarklet.txt bookmarklet/install.html

      - name: Zip unpacked extension
        run: cd build && zip -r -FS ../unfold-unpacked.zip . -x '*.DS_Store'

      - uses: actions/upload-artifact@v4
        with:
          name: unfold-unpacked
          path: unfold-unpacked.zip
